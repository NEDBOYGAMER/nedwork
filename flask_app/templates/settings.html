<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/colors.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/basic.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bg.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/buttons.css') }}">

    <script type="module" src="{{ url_for('static', filename='js/settings.js') }}"></script>
</head>

<body>

    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <canvas id="bg-canvas"></canvas>

    <div id="vp">
        <div id="back-panel">

            <h1>General</h1>
            <hr class="divider">

            <div class="setting-row">
                <h2>Language</h2>

                <div class="dropdown">
                    <input type="checkbox" id="drop">

                    <div class="dropdown-header">
                        <label for="drop" class="dropdown-box">
                            <span class="dropdown-selected">English</span>
                            <span class="dropdown-arrow">▾</span>
                        </label>
                    </div>

                    <div class="dropdown-menu">
                        <span class="dropdown-option">English</span>
                        <span class="dropdown-option">Deutsch</span>
                        <span class="dropdown-option">Español</span>
                    </div>
                </div>
            </div>

            <h1>Appearance</h1>
            <hr class="divider">

            <div class="setting-row">
                <h2>Theme</h2>

                <input type="checkbox" id="switch">
                <label for="switch" class="toggle-box">
                    <span class="option left">Dark</span>
                    <span class="option right">Light</span>
                    <div class="slider"></div>
                </label>
            </div>

            <div class="setting-row">
                <h2>Color</h2>

                <div class="nselect">
                    <input type="radio" name="color" id="optviolet" checked>
                    <input type="radio" name="color" id="optgreen">
                    <input type="radio" name="color" id="optred">

                    <label class="option" for="optviolet">Violet</label>
                    <label class="option" for="optgreen">Green</label>
                    <label class="option" for="optred">Red</label>

                    <div class="nselect-slider"></div>
                </div>
            </div>

            <div class="setting-row">
                <h2>Background</h2>

                <div class="nselect">
                    <input type="radio" name="background" id="optgrid" checked>
                    <input type="radio" name="background" id="optblobs">
                    <input type="radio" name="background" id="optnone">

                    <label class="option" for="optgrid">Grid</label>
                    <label class="option" for="optblobs">Blobs</label>
                    <label class="option" for="optnone">None</label>

                    <div class="nselect-slider"></div>
                </div>
            </div>

            <h1>Notifications</h1>
            <hr class="divider">

            <div class="setting-row">
                <h2>Email</h2>
                <input type="email" class="ui-input" placeholder="name@example.com">
            </div>

            <div class="setting-row">
                <h2>Updates</h2>

                <label class="switch">
                    <input type="checkbox">
                    <span class="switch-track">
                        <span class="switch-knob"></span>
                    </span>
                </label>
            </div>

            <div class="setting-row">
                <h2>Messages</h2>

                <label class="switch">
                    <input type="checkbox">
                    <span class="switch-track">
                        <span class="switch-knob"></span>
                    </span>
                </label>
            </div>

            <div class="setting-row">
                <h2>Near Limit</h2>

                <label class="switch">
                    <input type="checkbox">
                    <span class="switch-track">
                        <span class="switch-knob"></span>
                    </span>
                </label>
            </div>

        </div>
    </div>

</body>
</html>
