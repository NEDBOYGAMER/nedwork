{% extends "base.html" %}

{% block title %}nedwork{% endblock %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}">
    <script type="module" src="{{ url_for('static', filename='js/pages/login.js') }}"></script>
{% endblock %}
<!-- custom cursor -->


{% block content %}
<div id="main-box">
    <h1 class="title" id="Welcome">Welcome</h1>
    <h2 class="title" id="nedwork">to nedwork</h2>
    <div id="pulse-bar"></div>
</div>


<div id="login-box">
    <h2 class="login-titel" id="Log-In">LOGIN</h2>

    <h3 class="login-text" id="username-label">Username</h3>
    <input class="login_input" id="username" placeholder="Username" required>
    <h3 class="login-text" id="password-label">Password</h3>
    <input class="login_input" type="password" id="password" placeholder="Password" required>
    <div id="buttons">
        <button id="log-button">LOGIN</button>
        <button id="reg-button" data-url="{{ url_for('auth.register_page') }}">Register </button>
    </div>
</div>
{% endblock %}
