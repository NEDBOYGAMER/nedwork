<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/colors.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/basic.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bg.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

    <script type="module" src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</head>

<body>

    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <canvas id="bg-canvas"></canvas>

    <!-- ── Sidebar ──────────────────────────────────────────────────── -->
    <aside id="side-nav">

        <div class="nav-top">
            <div class="logo">Dash</div>
        </div>

        <div class="nav-section">
            <button class="nav-item active">Home</button>
        </div>

        <div class="nav-section grow"></div>

        <div class="nav-section">
            <button class="icon-item" id="about-btn" title="Settings">ℹ️</button>
            <button class="icon-item" id="settings-btn" title="Settings">⚙</button>
            <button class="icon-item" id="account-btn"  title="Account">👤</button>
        </div>

        <div class="nav-bottom">
            <button class="nav-item danger">Logout</button>
        </div>

    </aside>

    <!-- ── Main content ─────────────────────────────────────────────── -->
    <main id="content">

        <header class="dash-header">
            <span class="dash-greeting" id="dash-greeting">Dashboard</span>
            <span class="dash-date"     id="dash-date"></span>
        </header>

        <div id="card-grid">
            <!-- Cards injected by dashboard.js -->
        </div>

    </main>

    <!-- ── Add-widget button ────────────────────────────────────────── -->
    <button id="plus-button" title="Add widget">+</button>

    <!-- ── Overlay ──────────────────────────────────────────────────── -->
    <div id="overlay" class="hidden"></div>

    <!-- ── Widget picker modal ──────────────────────────────────────── -->
    <div id="add-window" class="hidden">
        <div class="modal-header">
            <span class="modal-title">Add Widget</span>
            <button id="close-add-window" class="close-btn">✕</button>
        </div>
        <div id="widget-picker">
            <!-- Populated by dashboard.js -->
        </div>
    </div>

</body>
</html>
